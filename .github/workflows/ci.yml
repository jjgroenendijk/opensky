name: CI

# GH Actions CPU quota exhausted (2026-07-20) -> automatic runs disabled;
# git hooks (.githooks/, wired by `make bootstrap`) are the only gate for
# now. Manual dispatch kept so the workflow can verify a branch when quota
# returns; restoring pull_request/push triggers + required status checks on
# main re-enables CI (see docs/todo.md).
on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format & lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: brew install swiftformat swiftlint markdownlint-cli2 shellcheck
      - name: Format check
        run: make format-check
      - name: Lint (strict)
        run: make lint

  build-test:
    name: Build & test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Xcode version
        id: xcode
        # Project needs Xcode 26+ (macOS 26 SDK, Metal 4, project format 26.3).
        # Hosted runners may lag; skip the build explicitly instead of failing
        # on an unbuildable toolchain. Local pre-push runs the same build/test.
        run: |
          major=$(xcodebuild -version | awk '/^Xcode/{print int($2)}')
          echo "major=$major" >> "$GITHUB_OUTPUT"
          if [ "$major" -lt 26 ]; then
            echo "::warning::Xcode $major < 26 on runner; build/test skipped." \
              "Local pre-push hook and a future macos-26 runner cover this gate."
          fi
      - name: Install Metal Toolchain
        if: ${{ steps.xcode.outputs.major >= 26 }}
        run: xcodebuild -downloadComponent MetalToolchain
      - name: Build & test (unit)
        if: ${{ steps.xcode.outputs.major >= 26 }}
        run: make test XCODEBUILD_FLAGS='CODE_SIGN_IDENTITY=- DEVELOPMENT_TEAM='
      - name: UI tests
        if: ${{ steps.xcode.outputs.major >= 26 }}
        run: make test-ui XCODEBUILD_FLAGS='CODE_SIGN_IDENTITY=- DEVELOPMENT_TEAM='
