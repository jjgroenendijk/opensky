name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format & lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: brew install swiftformat swiftlint markdownlint-cli2 shellcheck
      - name: Format check
        run: make format-check
      - name: Lint (strict)
        run: make lint

  build-test:
    name: Build & test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & test
        run: make test
