# OpenSky SwiftLint config — strict linting mandatory (AGENTS.md "Code quality").
# The pre-commit hook runs `swiftlint --strict`, so warnings block commits too.

included:
  - opensky
  - openskyTests
  - openskyUITests

excluded:
  - .build
  - build
  - DerivedData
  - Pods
  - "**/*.generated.swift"

# Treat everything seriously: the hook passes --strict, so any warning fails.
opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - yoda_condition

# Legal & IP / reverse-engineering: no force-unwrap/cast on data from external files.
force_cast: error
force_try: error
force_unwrapping: error
implicitly_unwrapped_optional: error

line_length:
  warning: 100
  error: 120
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length: 2
  excluded: [i, j, k, x, y, z, u, v, w, id, dt, up, r, g, b, a]

type_name:
  min_length: 3
  max_length: 50

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 12
  error: 20

nesting:
  type_level: 2

reporter: "xcode"
