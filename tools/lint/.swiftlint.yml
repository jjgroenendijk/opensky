# OpenSky SwiftLint config — strict linting mandatory (AGENTS.md "Code quality").
# The pre-commit hook runs `swiftlint --strict`, so warnings block commits too.

# No `included:` here — SwiftLint resolves config paths relative to this file's
# directory (tools/lint/), not the repo root. Callers pass paths explicitly
# (Makefile SWIFT_PATHS, pre-commit hook passes staged files).
excluded:
  - .build
  - build
  - DerivedData
  - Pods
  - "**/*.generated.swift"

# Treat everything seriously: the hook passes --strict, so any warning fails.
opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - yoda_condition

# "Master" is the TES4 domain term (MAST field, master list — UESP "Skyrim
# Mod:Mod File Format"); renaming would break spec traceability. Allowed for
# that vocabulary only, not as a general opt-out.
inclusive_language:
  override_allowed_terms: [master, masters]

# Legal & IP / reverse-engineering: no force-unwrap/cast on data from external files.
force_cast: error
force_try: error
force_unwrapping: error
implicitly_unwrapped_optional: error

line_length:
  warning: 100
  error: 120
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length: 2
  excluded: [i, j, k, x, y, z, u, v, w, id, dt, up, r, g, b, a]

type_name:
  min_length: 3
  max_length: 50

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 12
  error: 20

nesting:
  type_level: 2

# SwiftFormat (--wrapconditions before-first, --enable wrapMultilineStatementBraces)
# breaks a long `if let a, let b, c > 0 {` onto multiple lines and drops the `{`
# onto its own line. Default opening_brace then flags that brace, so the two
# formatters fight and the only escape is hand-restructuring the condition. Let
# SwiftFormat own multi-line condition/signature/header brace placement; still
# catch same-line offenders like `func abc(){}`.
opening_brace:
  ignore_multiline_statement_conditions: true
  ignore_multiline_function_signatures: true
  ignore_multiline_type_headers: true

reporter: "xcode"
